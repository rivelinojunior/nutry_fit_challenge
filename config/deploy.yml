# Name of your application. Used to uniquely configure containers.
service: nutry_fit_challenge

# Name of the container image.
image: rivelinojunior/nutry_fit_challenge

# Deploy to these servers.
x-server-host: &server_host 178.104.170.104

servers:
  web:
    - *server_host

proxy:
  ssl: true
  host: desafio.nutry.fit

# Credentials for your image host.
registry:
  username: rivelinojunior
  password:
    - KAMAL_REGISTRY_PASSWORD

# Inject ENV variables into containers (secrets come from .kamal/secrets).
env:
  secret:
    - RAILS_MASTER_KEY
    - POSTGRES_PASSWORD

  clear:
    # Run the Solid Queue Supervisor inside the web server's Puma process to do jobs.
    APP_HOST: "desafio.nutry.fit"
    SOLID_QUEUE_IN_PUMA: true
    DATABASE_USERNAME: "nutry_fit_admin"
    DATABASE_HOST: "nutry_fit_challenge-db"
    DATABASE_PORT: "5432"
    RAILS_LOG_LEVEL: "info"
    RAILS_ENV: "production"

# Aliases are triggered with "bin/kamal <alias>". You can overwrite arguments on invocation:
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

volumes:
  - "nutry_fit_challenge_storage:/rails/storage"

asset_path: /rails/public/assets

builder:
  arch: amd64
  driver: docker

ssh:
  user: root
  keys:
    - "~/.ssh/local-rivelino-work-computer-ssh-key.pem"

accessories:
  db:
    image: postgres:18.1-alpine
    host: *server_host
    # Fat Fit already uses 127.0.0.1:5432 on this VPS; keep this app's host port separate.
    port: "127.0.0.1:5433:5432"
    env:
      clear:
        POSTGRES_USER: nutry_fit_admin
        POSTGRES_DB: nutry_fit_challenge_production
      secret:
        - POSTGRES_PASSWORD
    volumes:
      - "/mnt/postgres-data/nutry_fit_challenge:/var/lib/postgresql/data"
